<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <script>if(location.hostname==="hill02252024.github.io")location.replace("https://todays-tasks.com"+location.pathname+location.search+location.hash);</script>
  <meta charset="UTF-8" />
  <title>Redirecting…</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://todays-tasks.com/china/" />
  <script>
    (function(){
      var p = new URLSearchParams(location.search);
      var id = p.get('id');
      if (id && /^[A-Za-z0-9_-]+$/.test(id)) {
        location.replace('/china/posts/' + encodeURIComponent(id) + '.html');
      } else {
        location.replace('/china/');
      }
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=/china/" />
</head>
<body>
  <p>This page has moved. Redirecting to <a href="/china/">/china/</a>.</p>
</body>
</html>
