name: Build Sitemap, Posts and RSS
on:
  schedule:
    - cron: "0 18 * * *"  # 每天香港時間 02:00 自動運行
  workflow_dispatch:
  push:
    paths:
      - "scripts/build-sitemaps.mjs"
      - "scripts/static-render-posts.mjs"

# Workflow-level env. FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 opts the
# JavaScript actions used below (checkout, setup-node) into the Node 24
# runtime as it rolls out, ahead of the eventual default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Explicit write permission for the auto-commit step. Without this, the
# default GITHUB_TOKEN is read-only and `git push` exits 128
# ("Permission to <repo>.git denied to github-actions[bot]").
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/static-render-posts.mjs
      - run: node scripts/build-sitemaps.mjs
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml sitemap-pages.xml sitemap-posts.xml feed.xml china/posts/
          git commit -m "Auto update sitemap, posts & feed" || echo "No changes"
          git push
